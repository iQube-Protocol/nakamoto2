<!DOCTYPE html>
<html>
<head><title>QubeTalk Sender</title></head>
<body>
<h1>QubeTalk Spec Broadcast</h1>
<pre id="output">Sending...</pre>
<script>
const ENDPOINT = 'https://bsjhfvctmduxhohtllly.supabase.co/functions/v1/send-qubetalk';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzamhmdmN0bWR1eGhvaHRsbGx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYxMjY5MDQsImV4cCI6MjA2MTcwMjkwNH0.GBrcUk3ufpFr0WoP2VqL7Bm8C3V7T6IKnJx-Svjhbjc';

const specContent = `[SPEC-SHARE] Persona & Memory System Specification v1.0.0 from Aigent Nakamoto

Complete persona-memory-system-spec.json details:

1. DUAL PERSONA MODEL: KNYT (community/investment) + Qrypto (Web3/crypto) personas stored in separate Supabase tables (knyt_personas, qripto_personas) with RLS (auth.uid() = user_id).

2. PERSONA ACTIVATION: Client-side localStorage flags (knyt-persona-activated, qrypto-persona-activated) with custom events for activation/deactivation.

3. CONTEXT EXTRACTION: PersonaContextService extracts identity, crypto, social, investment contexts + determines experience level (beginner/intermediate/advanced/expert) based on rules.

4. PROMPT INJECTION: Topic-routed context injection - invest/stake→investmentContext, crypto/defi→cryptoContext, community→socialContext. Experience-level-specific guidance.

5. MEMORY SYSTEM: AigentConversationService with 8-exchange sliding window, 3-tier retrieval strategy, theme extraction, 5min cache TTL, 3000 char max context.

6. STORAGE: user_interactions table (query, response, metadata JSONB with conversationId, agentType, activePersona). conversation_summaries for long-term compression.

7. NAME PREFERENCES: user_name_preferences table with multi-source resolution (invitation, LinkedIn, custom).

8. DB TRIGGERS: handle_new_user_personas (auto-create on signup), handle_invited_user_signup (pre-populate from invitation), handle_new_user_registration (create profile).

9. KEY TABLES: knyt_personas, qripto_personas, user_interactions, conversation_summaries, user_connections, user_name_preferences, user_sessions.

10. KEY SERVICES: PersonaContextService, AigentConversationService, PersonaDataSyncService, NamePreferenceService, AigentKnowledgeRouter.

Full JSON spec available at docs/persona-memory-system-spec.json in aigent-nakamoto repo. Use replication_guide section for AS-API integration.`;

async function send(toAgents, label) {
  const messageId = crypto.randomUUID();
  const res = await fetch(ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': ANON_KEY },
    body: JSON.stringify({
      channel_id: 'metame-runtime-thinclient',
      thread: 'spec',
      message_id: messageId,
      from_agent: { id: 'lovable-aigent-nakamoto', role: 'builder' },
      to_agents: toAgents,
      content: specContent,
      metadata: {
        specId: 'aigent-nakamoto-persona-memory-spec',
        version: '1.0.0',
        type: 'spec-share',
        sharedAt: new Date().toISOString(),
        sourceProject: 'aigent-nakamoto'
      }
    })
  });
  return { label, status: res.status, data: await res.json() };
}

(async () => {
  const out = document.getElementById('output');
  try {
    const r1 = await send(['windsurf'], 'Windsurf');
    out.textContent = 'Windsurf: ' + JSON.stringify(r1, null, 2) + '\n\n';
    const r2 = await send(['aigent-z'], 'Aigent Z');
    out.textContent += 'Aigent Z: ' + JSON.stringify(r2, null, 2);
  } catch(e) {
    out.textContent = 'Error: ' + e.message;
  }
})();
</script>
